<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Trip Schedule</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{

height:100vh;

display:flex;
justify-content:center;
align-items:center;

background:
linear-gradient(rgba(0,0,0,0.2),rgba(0,0,0,0.2)),
url("https://images.unsplash.com/photo-1507525428034-b723cf961d3e?w=1600");

background-size:cover;
background-position:center;

}

.container{

width:900px;

padding:40px;

background:rgba(255,255,255,0.20);

backdrop-filter:blur(12px);

border-radius:25px;

box-shadow:0px 8px 30px rgba(0,0,0,.3);

color:white;

}

h1{

text-align:center;

margin-bottom:30px;

font-size:40px;

}

.grid{

display:grid;

grid-template-columns:1fr 1fr;

gap:20px;

}

.card{

background:rgba(255,255,255,.2);

padding:20px;

border-radius:15px;

font-size:18px;

transition:.4s;

}

.card:hover{

transform:scale(1.04);

}

.card b{

color:yellow;

}

.button{

margin-top:35px;

text-align:center;

}

button{

padding:15px 35px;

border:none;

border-radius:30px;

font-size:18px;

font-weight:bold;

background:#00c853;

color:white;

cursor:pointer;

transition:.4s;

}

button:hover{

transform:scale(1.05);

background:#00a844;

}

</style>

</head>

<body>

<div class="container">

<h1>✈ Your Trip Schedule</h1>

<div class="grid">

<div class="card">

<b>📍 Current Location:</b><br><br>

{{source}}

</div>

<div class="card">

<b>🌍 Destination:</b><br><br>

{{destination}}

</div>

<div class="card">

<b>📅 Start Date:</b><br><br>

{{start_date}}

</div>

<div class="card">

<b>📅 End Date:</b><br><br>

{{end_date}}

</div>

<div class="card">

<b>💰 Budget:</b><br><br>

₹{{budget}}

</div>

<div class="card">

<b>🚗 Transport:</b><br><br>

{{transport}}

</div>

<div class="card">

<b>🏨 Accommodation:</b><br><br>

{{accommodation}}

</div>

<div class="card">

<b>🎯 Activities:</b><br><br>

{{activities}}

</div>

</div>

<div class="button">

<a href="/mytrips/">

<button>

Saved Trips →

</button>

</a>

</div>

</div>

</body>
</html>
