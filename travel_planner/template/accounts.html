<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TripMate Login</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:
linear-gradient(rgba(0,0,0,0.45),rgba(0,0,0,0.45)),
url('https://images.unsplash.com/photo-1500530855697-b586d89ba3ee');
background-size:cover;
background-position:center;
}

.container{
width:420px;
padding:40px;
border-radius:25px;
background:rgba(255,255,255,0.12);
backdrop-filter:blur(15px);
box-shadow:0 8px 32px rgba(0,0,0,0.3);
color:white;
}

.logo{
text-align:center;
font-size:40px;
font-weight:700;
margin-bottom:10px;
color:#00cfff;
}

.subtitle{
text-align:center;
margin-bottom:30px;
font-size:15px;
color:#e5e7eb;
}

.input-group{
margin-bottom:20px;
}

.input-group input{
width:100%;
padding:15px;
border:none;
outline:none;
border-radius:12px;
font-size:16px;
background:rgba(255,255,255,0.15);
color:white;
}

.input-group input::placeholder{
color:#d1d5db;
}

.btn{
width:100%;
padding:15px;
border:none;
border-radius:12px;
font-size:17px;
font-weight:600;
cursor:pointer;
transition:0.3s;
margin-top:10px;
}

.login-btn{
background:#00cfff;
color:white;
}

.login-btn:hover{
transform:translateY(-3px);
}

.register-btn{
background:#22c55e;
color:white;
}

.register-btn:hover{
transform:translateY(-3px);
}

.message{
margin-top:15px;
padding:10px;
border-radius:10px;
background:rgba(255,255,255,0.15);
text-align:center;
}

.back-home{
display:block;
text-align:center;
margin-top:20px;
color:white;
text-decoration:none;
}

.back-home:hover{
color:#00cfff;
}

</style>
</head>
<body>

<div class="container">

<div class="logo">
✈ TripMate
</div>

<p class="subtitle">
Login or Create an Account to Start Planning Your Journey
</p>

<form method="POST">

{% csrf_token %}

<div class="input-group">
<input
type="text"
name="username"
placeholder="Enter Username"
required>
</div>

<div class="input-group">
<input
type="password"
name="password"
placeholder="Enter Password"
required>
</div>

<button
type="submit"
name="action"
value="login"
class="btn login-btn">
Login
</button>

<button
type="submit"
name="action"
value="register"
class="btn register-btn">
Create Account
</button>

</form>

{% if messages %}
{% for message in messages %}
<div class="message">
{{ message }}
</div>
{% endfor %}
{% endif %}

<a href="{% url 'home' %}" class="back-home">
← Back to Home
</a>

</div>

</body>
</html>
