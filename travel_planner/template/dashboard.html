<!DOCTYPE html>
<html>

<head>

<title>Dashboard</title>

<style>

body{

font-family:Arial;
padding:50px;

background:linear-gradient(135deg,#0f172a,#2563eb);

color:white;

}

.container{

width:900px;

margin:auto;

padding:40px;

border-radius:30px;

background:rgba(255,255,255,.1);

backdrop-filter:blur(20px);

}

.grid{

display:grid;

grid-template-columns:repeat(2,1fr);

gap:20px;

}

.card{

padding:25px;

border-radius:20px;

background:rgba(255,255,255,.2);

}

.value{

font-size:25px;
color:cyan;

}

button{

padding:15px 30px;

margin-top:30px;

border:none;

border-radius:30px;

background:cyan;

font-size:18px;

cursor:pointer;

}

a{

text-decoration:none;

}

</style>

</head>

<body>

<div class="container">

<h1 align="center">

✈ Travel Dashboard

</h1>

<div class="grid">

<div class="card">

Current Location

<div class="value">

{{trip.source}}

</div>

</div>


<div class="card">

Destination

<div class="value">

{{trip.destination}}

</div>

</div>


<div class="card">

Start Date

<div class="value">

{{trip.start_date}}

</div>

</div>


<div class="card">

End Date

<div class="value">

{{trip.end_date}}

</div>

</div>


<div class="card">

Budget

<div class="value">

₹{{trip.budget}}

</div>

</div>


<div class="card">

Transport

<div class="value">

{{trip.transport}}

</div>

</div>

</div>


<center>

<a href="{% url 'expenses' %}">

<button>

View Expenses →

</button>

</a>

</center>

</div>

</body>

</html>
