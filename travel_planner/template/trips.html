<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Plan Trip</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{
background:linear-gradient(135deg,#0f172a,#1e3a8a);
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:30px;
}

.container{
background:white;
width:800px;
padding:40px;
border-radius:20px;
box-shadow:0 10px 30px rgba(0,0,0,0.3);
}

h1{
text-align:center;
margin-bottom:30px;
color:#1e3a8a;
}

.row{
display:flex;
gap:20px;
margin-bottom:20px;
}

.col{
flex:1;
}

label{
display:block;
margin-bottom:8px;
font-weight:bold;
color:#333;
}

input,
select,
textarea{
width:100%;
padding:12px;
border:1px solid #ccc;
border-radius:10px;
font-size:15px;
}

textarea{
resize:none;
height:100px;
}

button{
width:100%;
padding:15px;
background:#2563eb;
color:white;
border:none;
border-radius:10px;
font-size:18px;
cursor:pointer;
margin-top:20px;
}

button:hover{
background:#1d4ed8;
}

</style>

</head>

<body>

<div class="container">

<h1>✈ Plan Your Trip</h1>

<form method="POST">

{% csrf_token %}

<div class="row">

<div class="col">
<label>Source</label>
<input
type="text"
name="source"
placeholder="Enter Source City"
required>
</div>

<div class="col">
<label>Destination</label>
<input
type="text"
name="destination"
placeholder="Enter Destination"
required>
</div>

</div>

<div class="row">

<div class="col">
<label>Start Date</label>
<input
type="date"
name="start_date"
required>
</div>

<div class="col">
<label>End Date</label>
<input
type="date"
name="end_date"
required>
</div>

</div>

<div class="row">

<div class="col">
<label>Budget (₹)</label>
<input
type="number"
name="budget"
placeholder="Enter Budget"
required>
</div>

<div class="col">
<label>Transport</label>

<select name="transport" required>

<option value="">Select</option>
<option value="Bus">Bus</option>
<option value="Train">Train</option>
<option value="Flight">Flight</option>
<option value="Car">Car</option>

</select>

</div>

</div>

<div class="row">

<div class="col">
<label>Accommodation</label>

<input
type="text"
name="accommodation"
placeholder="Hotel / Resort"
required>

</div>

</div>

<label>Activities</label>

<textarea
name="activities"
placeholder="Sightseeing, Trekking, Shopping, Beaches..."
required>
</textarea>

<button type="submit">
Continue To Destinations →
</button>

</form>

</div>

</body>
</html>
